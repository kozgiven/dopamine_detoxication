<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detox</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fg: #e8e2d9;
    --fg-dim: #6b6560;
    --fg-muted: #3a3835;
    --bg: #0a0908;
    --accent: #c9b99a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* ─── SETUP SCREEN ─── */
  #setup {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    transition: opacity 1.2s ease;
  }

  #setup.fade-out { opacity: 0; pointer-events: none; }

  .app-label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(11px, 1.5vw, 13px);
    letter-spacing: 0.35em;
    color: var(--fg-muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .time-builder {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 4rem;
  }

  .unit-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .unit-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--fg-muted);
    text-transform: uppercase;
  }

  .unit-display {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(64px, 10vw, 96px);
    color: var(--fg);
    line-height: 1;
    min-width: 2ch;
    text-align: center;
    transition: color 0.2s;
  }

  .unit-controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-btn {
    background: none;
    border: 0.5px solid var(--fg-muted);
    color: var(--fg-muted);
    width: 28px; height: 28px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn:active { transform: scale(0.95); }

  .separator {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(48px, 8vw, 72px);
    color: var(--fg-muted);
    padding: 0 0.4rem;
    margin-top: -1.2rem;
  }

  #go-btn {
    background: none;
    border: 0.5px solid var(--fg-muted);
    color: var(--fg-dim);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    padding: 14px 48px;
    cursor: pointer;
    border-radius: 1px;
    transition: border-color 0.3s, color 0.3s;
    position: relative;
    overflow: hidden;
  }

  #go-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  #go-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #go-btn:active { transform: scale(0.98); }
  #go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ─── DETOX SCREEN ─── */
  #detox {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.8s ease;
  }

  #detox.active {
    opacity: 1;
    pointer-events: all;
  }

  #countdown {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(48px, 12vw, 110px);
    color: #1a1a18;
    letter-spacing: 0.08em;
    line-height: 1;
    transition: color 2s ease;
  }

  #detox.active #countdown { color: #2a2a26; }

  #done-msg {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--accent);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 2s ease;
  }

  #exit-hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #111110;
    text-transform: uppercase;
    transition: color 2s ease;
    cursor: pointer;
  }

  #exit-hint.visible { color: #2d2d2a; }
  #exit-hint:hover { color: #5a5a54 !important; }

  .progress-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #ring-track { stroke: #111110; }
  #ring-fill { stroke: #1e1e1c; transition: stroke-dashoffset 1s linear, stroke 2s ease; }
  #detox.active #ring-track { stroke: #151513; }
  #detox.active #ring-fill { stroke: #232320; }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <p class="app-label">dopamine detox</p>

  <div class="time-builder">
    <div class="unit-block">
      <span class="unit-label">hours</span>
      <span class="unit-display" id="hr-display">00</span>
      <div class="unit-controls">
        <button class="ctrl-btn" onclick="adjust('hr', 1)">+</button>
        <button class="ctrl-btn" onclick="adjust('hr', -1)">−</button>
      </div>
    </div>

    <div>
      <div class="separator">:</div>
    </div>

    <div class="unit-block">
      <span class="unit-label">minutes</span>
      <span class="unit-display" id="min-display">25</span>
      <div class="unit-controls">
        <button class="ctrl-btn" onclick="adjust('min', 5)">+</button>
        <button class="ctrl-btn" onclick="adjust('min', -5)">−</button>
      </div>
    </div>

    <div>
      <div class="separator">:</div>
    </div>

    <div class="unit-block">
      <span class="unit-label">seconds</span>
      <span class="unit-display" id="sec-display">00</span>
      <div class="unit-controls">
        <button class="ctrl-btn" onclick="adjust('sec', 10)">+</button>
        <button class="ctrl-btn" onclick="adjust('sec', -10)">−</button>
      </div>
    </div>
  </div>

  <button id="go-btn" onclick="startDetox()">go</button>
</div>

<!-- Detox black screen -->
<div id="detox">
  <svg class="progress-ring" width="320" height="320" viewBox="0 0 320 320">
    <circle id="ring-track" cx="160" cy="160" r="148" fill="none" stroke-width="0.5"/>
    <circle id="ring-fill" id="ring-fill" cx="160" cy="160" r="148" fill="none" stroke-width="0.5"
      stroke-dasharray="930" stroke-dashoffset="0"
      transform="rotate(-90 160 160)"/>
  </svg>

  <div id="countdown">00:00:00</div>
  <div id="done-msg">detox complete</div>
</div>

<div id="exit-hint" onclick="endDetox()">tap to end</div>

<script>
  let hr = 0, min = 25, sec = 0;
  let totalSeconds = 0, remaining = 0;
  let timer = null;

  const pad = n => String(n).padStart(2, '0');

  function adjust(unit, delta) {
    if (unit === 'hr') { hr = Math.max(0, Math.min(23, hr + delta)); }
    if (unit === 'min') { min = Math.max(0, Math.min(55, min + delta)); }
    if (unit === 'sec') { sec = Math.max(0, Math.min(50, sec + delta)); }
    document.getElementById('hr-display').textContent = pad(hr);
    document.getElementById('min-display').textContent = pad(min);
    document.getElementById('sec-display').textContent = pad(sec);
    document.getElementById('go-btn').disabled = (hr === 0 && min === 0 && sec === 0);
  }

  function updateCountdown() {
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    document.getElementById('countdown').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

    const frac = 1 - (remaining / totalSeconds);
    const circ = 2 * Math.PI * 148;
    document.getElementById('ring-fill').setAttribute('stroke-dashoffset', circ * (1 - frac));
  }

  function startDetox() {
    totalSeconds = hr * 3600 + min * 60 + sec;
    if (totalSeconds === 0) return;
    remaining = totalSeconds;

    document.getElementById('setup').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('setup').style.display = 'none';
      document.getElementById('detox').classList.add('active');
      document.getElementById('exit-hint').classList.add('visible');
      updateCountdown();

      timer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          remaining = 0;
          clearInterval(timer);
          document.getElementById('countdown').style.opacity = '0';
          document.getElementById('done-msg').style.opacity = '1';
          document.getElementById('exit-hint').style.color = '#3a3a36';
        }
        updateCountdown();
      }, 1000);
    }, 1200);
  }

  function endDetox() {
    clearInterval(timer);
    document.getElementById('detox').classList.remove('active');
    document.getElementById('exit-hint').classList.remove('visible');
    document.getElementById('countdown').style.opacity = '1';
    document.getElementById('done-msg').style.opacity = '0';
    document.getElementById('ring-fill').setAttribute('stroke-dashoffset', '0');

    setTimeout(() => {
      document.getElementById('setup').style.display = 'flex';
      requestAnimationFrame(() => {
        document.getElementById('setup').classList.remove('fade-out');
      });
    }, 200);
  }

  adjust('min', 0);
</script>
</body>
</html>
